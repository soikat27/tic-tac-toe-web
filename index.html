<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/tic-tac-toe.js" defer></script>
</head>
<body>
    <div class="main">
        <div class="header">
            <h1>Tic-Tac-Toe</h1>
            <p class="subtitle">Line up 3 markers to win</p>
        </div>
        <div class="players">
            <div class="player-card p1">
                <h3>Player 1</h3>
                <div class="player-meta">
                    <p><span class="label">Name:</span> <span class="value">-</span></p>
                    <p><span class="label">Marker:</span> <span class="value">X</span></p>
                </div>
            </div>
            <div class="player-card p2">
                <h3>Player 2</h3>
                <div class="player-meta">
                    <p><span class="label">Name:</span> <span class="value">-</span></p>
                    <p><span class="label">Marker:</span> <span class="value">O</span></p>
                </div>
            </div>
        </div>
        <div class="board-wrap">
            <div class="board">
            </div>
        </div>
    </div>
</body>
</html>
