<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/tic-tac-toe.js" defer></script>
</head>
<body>
    <div class="main">
        <div class="header">
            <!-- Enter player's name: -->
            <dialog id="name">
                <h2>TIC-TAC-TOE</h2>
                <p>Enter player's name to begin</p>

                <form>
                    <div class="name-p1">
                        <label for="player1">Player 1 (X)</label>
                        <input type="text" id="player1" placeholder="Ex: Jim" required>
                    </div>
                    <div class="name-p2">
                        <label for="player2">Player 2 (O)</label>
                        <input type="text" id="player2" placeholder="Ex: Pam" required>
                    </div>
                    <button type="submit">Start Game</button>
                </form>
            </dialog>

            <h1>Tic-Tac-Toe</h1>
            <p class="subtitle">Line up 3 markers to win!</p>
        </div>
        <div class="players">
            <div class="player-card p1">
                <h3>Player 1</h3>
                <div class="player-meta">
                    <p><span class="label">Name:</span> <span class="p1-name value">-</span></p>
                    <p><span class="label">Marker:</span> <span class="value">X</span></p>
                </div>
            </div>
            <div class="player-card p2">
                <h3>Player 2</h3>
                <div class="player-meta">
                    <p><span class="label">Name:</span> <span class="p2-name value">-</span></p>
                    <p><span class="label">Marker:</span> <span class="value">O</span></p>
                </div>
            </div>
        </div>
        <div class="board-wrap">
            <div class="board">
            </div>
        </div>
    </div>
</body>
</html>
